name: Mantiz Scan 🔍

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  mantiz-scan:
    runs-on: ubuntu-latest
    name: AI Lie Detector

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need HEAD~1 for git diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Mantiz Scan 🔍
        id: mantiz
        continue-on-error: true
        run: |
          npx tsx src/cli/scan.ts
        env:
          NODE_ENV: ci

      - name: Mantiz Results
        if: steps.mantiz.outcome != 'success'
        run: |
          echo "::warning::Mantiz detected suspicious code changes!"
          echo "::warning::Trust score below 70 — review findings above."

      - name: Run TestSprite Smoke Tests 🧪
        id: testsprite
        if: always()
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        run: |
          if [ -z "$TESTSPRITE_API_KEY" ]; then
            echo "::warning::TESTSPRITE_API_KEY not set — skipping TestSprite tests"
            exit 0
          fi

          echo "Running TestSprite smoke tests against live app..."
          # Run landing page + diff scan tests (the two most critical)
          npx testsprite@latest test run 54fb472b-cd69-4f7b-8711-aa45625abb1e \
            --target-url https://mantiz-wine.vercel.app \
            --wait \
            --timeout 300 \
            --output json || true

          npx testsprite@latest test run 85f99ee9-7119-4df3-a026-ed6339a47e4c \
            --target-url https://mantiz-wine.vercel.app \
            --wait \
            --timeout 300 \
            --output json || true

          echo "TestSprite smoke tests complete."

      - name: Final Status
        if: steps.mantiz.outcome != 'success'
        run: |
          echo "::error::Mantiz blocked this change — trust score too low."
          exit 1

name: Detector CI Gate 🔬

on:
  pull_request:
    paths:
      - 'src/detectors/*.ts'
      - 'packages/mantiz-core/src/detectors/*.ts'
      - 'packages/mantiz-core/src/engine.ts'
      - 'scripts/eval/*.ts'
      - 'eval/ground-truth/labeled_v*_labeled.jsonl'
      - 'eval/ground-truth/reports/calibration-v*.json'
  push:
    branches: [main, master]
    paths:
      - 'src/detectors/*.ts'
      - 'packages/mantiz-core/src/detectors/*.ts'
      - 'packages/mantiz-core/src/engine.ts'
      - 'scripts/eval/*.ts'

jobs:
  check:
    runs-on: ubuntu-latest
    name: Detector Performance Gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Detector CI Check 🔬
        id: detector-check
        run: |
          set +e
          REPORT=$(npx tsx scripts/eval/ci-check.ts 2>&1)
          EXIT_CODE=$?
          echo "$REPORT"
          echo "ci_report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit $EXIT_CODE
        env:
          CI: 'true'

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detector-ci-report
          path: eval/ground-truth/reports/
          retention-days: 30

      - name: Post PR comment (on failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.detector-check.outputs.ci_report }}`;
            let reportSummary = '';
            let verdict = 'FAIL';
            try {
              const parsed = JSON.parse(report);
              verdict = parsed.summary?.verdict || 'FAIL';
              const failedDet = parsed.detectors?.filter(d => d.status === 'fail') || [];
              const warned = parsed.detectors?.filter(d => d.status === 'warn') || [];
              reportSummary = failedDet.map(d =>
                `❌ ${d.detector}: prec ${d.currentPrecision.toFixed(1)}% (${d.precisionDiff >= 0 ? '+' : ''}${d.precisionDiff.toFixed(1)}), recall ${d.currentRecall.toFixed(1)}% (${d.recallDiff >= 0 ? '+' : ''}${d.recallDiff.toFixed(1)})`
              ).join('\n');
              if (warned.length > 0) {
                reportSummary += '\n\n⚠️ Warnings:\n' + warned.map(d =>
                  `  ${d.detector}: prec ${d.precisionDiff >= 0 ? '+' : ''}${d.precisionDiff.toFixed(1)}, recall ${d.recallDiff >= 0 ? '+' : ''}${d.recallDiff.toFixed(1)}`
                ).join('\n');
              }
            } catch (e) {
              reportSummary = 'Could not parse CI report. Check workflow logs.';
            }

            const body = `## 🔬 Detector CI Gate — ${verdict === 'PASS' ? 'PASSED ✅' : 'FAILED ❌'}

            ${reportSummary ? `### Failed detectors\n\`\`\`\n${reportSummary}\n\`\`\`` : 'All detectors within threshold.'}

            ### Next steps
            1. Run locally: \`npx tsx scripts/eval/ci-check.ts\`
            2. Review your changes to \`src/detectors/\` for unintended side effects.
            3. If regression is acceptable (e.g., precision-vs-recall tradeoff), update baseline:
               \`\`\`
               npx tsx scripts/eval/ci-check.ts --update
               \`\`\`
               Then commit the updated \`calibration-v1.json\`.

            ---
            *Generated by Mantiz Detector CI Gate*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

name: Publish to GPR and NPM 🚀

on:
  release:
    types: [published]

jobs:
  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@farhank15'

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build --if-present

      - name: Publish @farhank15/mantiz-core
        run: npm publish -w packages/mantiz-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @farhank15/mantiz-cli
        run: npm publish -w packages/mantiz-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-cli-npm:
    name: Publish mantiz-cli to NPM Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm install

      - name: Publish mantiz-cli to NPM
        run: |
          cd packages/mantiz-cli
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

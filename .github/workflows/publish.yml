name: Publish to GitHub Packages 🚀

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@farhank15'

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build --if-present

      - name: Publish @farhank15/mantiz-core
        run: npm publish -w packages/mantiz-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @farhank15/mantiz-cli
        run: npm publish -w packages/mantiz-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

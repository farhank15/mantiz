name: Publish to GPR and NPM 🚀

on:
  release:
    types: [published]

jobs:
  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@farhank15'

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build --if-present

      - name: Publish @farhank15/mantiz-core
        run: npm publish -w packages/mantiz-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @farhank15/mantiz-cli
        run: npm publish -w packages/mantiz-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to NPM Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org/'

      - name: Rewrite package scopes to @farhan22
        run: |
          sed -i 's/"name": "@farhank15\/mantiz-core"/"name": "@farhan22\/mantiz-core"/g' packages/mantiz-core/package.json
          sed -i 's/"name": "@farhank15\/mantiz-cli"/"name": "@farhan22\/mantiz-cli"/g' packages/mantiz-cli/package.json
          sed -i 's/"@farhank15\/mantiz-core": "0.1.1"/"@farhan22\/mantiz-core": "0.1.1"/g' packages/mantiz-cli/package.json
          sed -i 's/@farhank15\/mantiz-core/@farhan22\/mantiz-core/g' packages/mantiz-cli/src/index.ts
          sed -i '/"publishConfig": {/,/}/d' packages/mantiz-core/package.json
          sed -i '/"publishConfig": {/,/}/d' packages/mantiz-cli/package.json

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build --if-present

      - name: Publish @farhan22/mantiz-core to NPM
        run: npm publish -w packages/mantiz-core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @farhan22/mantiz-cli to NPM
        run: npm publish -w packages/mantiz-cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
